services:
  postgres:
    image: pgvector/pgvector:pg16
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: ironclaw
      POSTGRES_USER: ironclaw
      POSTGRES_PASSWORD: dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    ports: ["4222:4222", "8222:8222"]
    command: ["--jetstream"]

volumes:
  pgdata:
